<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global Converter — Валюты и единицы</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <h1>Global Converter</h1>
        <p class="subtitle">Конвертер валют и единиц измерения с офлайн-резервом</p>
        <div class="clock" id="liveClock">--:--:--</div>
        <div class="status" id="dataStatus">Загрузка курсов...</div>
      </header>

      <section class="card">
        <div class="card__title">💱 Конвертер валют</div>
        <div class="grid currency-grid">
          <label>
            Сумма
            <input id="amount" type="number" min="0" step="any" value="1" />
          </label>
          <label>
            Из
            <select id="fromCurrency"></select>
          </label>
          <label>
            В
            <select id="toCurrency"></select>
          </label>
        </div>
        <button id="swapBtn" class="btn">↔ Поменять местами</button>
        <div id="currencyResult" class="result">—</div>
        <div id="ratesInfo" class="muted">—</div>
      </section>

      <section class="card">
        <div class="card__title">📏 Конвертер единиц</div>
        <div class="grid units-grid">
          <label>
            Категория
            <select id="unitCategory"></select>
          </label>
          <label>
            Значение
            <input id="unitAmount" type="number" step="any" value="1" />
          </label>
          <label>
            Из
            <select id="fromUnit"></select>
          </label>
          <label>
            В
            <select id="toUnit"></select>
          </label>
        </div>
        <div id="unitResult" class="result">—</div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
